{{- with .Params.shareButtons | default site.Params.ShowShareButtons }}
<div class="share-divider">
  <hr class="share-line">
  <div class="share-buttons">
    <span class="share-label">Share</span>
    <a href="https://twitter.com/intent/tweet?text={{ $.Title }}&url={{ $.Permalink }}" target="_blank" rel="noopener" aria-label="Share on X">𝕏</a>
    <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ $.Permalink }}&title={{ $.Title }}" target="_blank" rel="noopener" aria-label="Share on LinkedIn">in</a>
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ $.Permalink }}" target="_blank" rel="noopener" aria-label="Share on Facebook">f</a>
    <a href="mailto:?subject={{ $.Title }}&body={{ $.Permalink }}" aria-label="Share via Email">✉</a>
  </div>
  <hr class="share-line">
</div>
{{- end }}
