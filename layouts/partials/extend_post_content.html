{{ if .Site.RegularPages }}
<div style="max-width:680px;margin:40px auto;padding:0 20px;">
  <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-top:1px solid var(--border);padding-top:24px;">More Posts</h3>
  {{ range first 3 (where .Site.RegularPages "Section" "posts") }}
  {{ if ne .Permalink $.Permalink }}
  <a href="{{ .Permalink }}" style="display:block;padding:14px 0;border-bottom:1px solid var(--border);text-decoration:none;">
    <div style="font-size:15px;font-weight:600;color:var(--primary);margin-bottom:4px;">{{ .Title }}</div>
    <div style="font-size:13px;color:var(--secondary);">{{ .Date.Format "Jan 2, 2006" }} - {{ .ReadingTime }} min read</div>
  </a>
  {{ end }}
  {{ end }}
</div>
{{ end }}

<script src="https://giscus.app/client.js"
        data-repo="elaineouyangml-eng/flowanriver"
        data-repo-id="R_kgDOSlbN2A"
        data-category="Announcements"
        data-category-id="DIC_kwDOSlbN2M4C9q85"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="en"
        crossorigin="anonymous"
        async>
</script>
