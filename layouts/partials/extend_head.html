<script>
document.addEventListener("DOMContentLoaded", function() {
  if (window.location.pathname === "/search/" || window.location.pathname === "/search") {
    var input = document.getElementById("searchInput");
    if (input) {
      var tags = document.createElement("div");
      tags.className = "search-tags";
      tags.innerHTML = "<p>Popular topics:</p><a href='/tags/ai'>AI</a><a href='/tags/crypto'>Crypto</a><a href='/tags/web3'>Web3</a><a href='/tags/stablecoin'>Stablecoin</a><a href='/tags/productivity'>Productivity</a><a href='/tags/solo-founder'>Solo Founder</a>";

    }
  }
});
